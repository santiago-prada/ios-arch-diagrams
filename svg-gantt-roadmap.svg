  <text x="40" y="56" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="12" font-weight="400" fill="#8E8E93">12-Week Migration Timeline — 2 Developer Tracks</text>

  <!-- Chart Area Constants: left=160, top=90, right=1160, barAreaTop=90 -->
  <!-- Week columns: each week = (1160-160)/12 = 83.33px -->

  <!-- Week Header Background -->
  <rect x="160" y="72" width="1000" height="28" fill="#F2F2F7" rx="6" ry="6"/>

  <!-- Week Labels -->
  <g font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="11" font-weight="500" fill="#8E8E93" text-anchor="middle">
    <text x="201.7" y="90">W1</text>
    <text x="285" y="90">W2</text>
    <text x="368.3" y="90">W3</text>
    <text x="451.7" y="90">W4</text>
    <text x="535" y="90">W5</text>
    <text x="618.3" y="90">W6</text>
    <text x="701.7" y="90">W7</text>
    <text x="785" y="90">W8</text>
    <text x="868.3" y="90">W9</text>
    <text x="951.7" y="90">W10</text>
    <text x="1035" y="90">W11</text>
    <text x="1118.3" y="90">W12</text>
  </g>

  <!-- Vertical Gridlines (dotted) -->
  <g stroke="#E5E5EA" stroke-width="1" stroke-dasharray="3,4" opacity="0.7">
    <line x1="243.3" y1="100" x2="243.3" y2="545"/>
    <line x1="326.7" y1="100" x2="326.7" y2="545"/>
    <line x1="410" y1="100" x2="410" y2="545"/>
    <line x1="493.3" y1="100" x2="493.3" y2="545"/>
    <line x1="576.7" y1="100" x2="576.7" y2="545"/>
    <line x1="660" y1="100" x2="660" y2="545"/>
    <line x1="743.3" y1="100" x2="743.3" y2="545"/>
    <line x1="826.7" y1="100" x2="826.7" y2="545"/>
    <line x1="910" y1="100" x2="910" y2="545"/>
    <line x1="993.3" y1="100" x2="993.3" y2="545"/>
    <line x1="1076.7" y1="100" x2="1076.7" y2="545"/>

  <rect x="243.3" y="130" width="250" height="22" rx="6" ry="6" fill="#007AFF" opacity="0.9" filter="url(#shadowSmall)"/>
  <text x="368.3" y="145" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="10" font-weight="500" fill="#FFFFFF" text-anchor="middle">CommunityUI Consolidation (9 tickets)</text>

  <!-- Weeks 5-6: FeatureHistory ~4d (green) -->
  <rect x="493.3" y="160" width="66.7" height="22" rx="6" ry="6" fill="#34C759" opacity="0.85" filter="url(#shadowSmall)"/>
  <text x="526.7" y="175" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="9" font-weight="500" fill="#FFFFFF" text-anchor="middle">FeatureHistory</text>


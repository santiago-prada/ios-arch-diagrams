    <!-- End of Week 4: Phase 1 + CommunityUI Complete -->
    <polygon points="493.3,268 501.3,278 493.3,288 485.3,278" fill="#007AFF" filter="url(#shadowSmall)"/>
    <text x="493.3" y="302" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="9" font-weight="600" fill="#007AFF" text-anchor="middle">Phase 0b/1</text>

    <!-- End of Week 5: Phase 2 Complete -->

  <rect x="486.7" y="260" width="500" height="44" rx="12" fill="#007AFF" opacity="0.9" filter="url(#shadowSmall)"/>
  <text x="736.7" y="282" font-size="20" font-weight="600" fill="#FFFFFF" text-anchor="middle">CommunityUI Consolidation (9 tickets)</text>
  <text x="736.7" y="298" font-size="16" font-weight="400" fill="rgba(255,255,255,0.7)" text-anchor="middle">~3 weeks</text>

  <!-- Weeks 5-6: FeatureHistory ~4d (green) -->
  <rect x="986.7" y="320" width="133.3" height="44" rx="12" fill="#34C759" opacity="0.85" filter="url(#shadowSmall)"/>
  <text x="1053.3" y="348" font-size="18" font-weight="500" fill="#FFFFFF" text-anchor="middle">FeatureHistory</text>

  <!-- Week 6: FeatureContent ~3d (green) -->
  <rect x="1120" y="320" width="100" height="44" rx="12" fill="#34C759" opacity="0.75" filter="url(#shadowSmall)"/>
  <text x="1170" y="348" font-size="16" font-weight="500" fill="#FFFFFF" text-anchor="middle">Content</text>


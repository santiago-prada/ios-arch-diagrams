  <text x="160" y="686" font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="middle">Developer 2</text>
  <text x="160" y="714" font-size="20" font-weight="400" fill="rgba(255,255,255,0.8)" text-anchor="middle">Domain &amp; Features</text>


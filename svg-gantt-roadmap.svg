  <rect x="1520" y="380" width="166.7" height="44" rx="12" fill="#34C759" filter="url(#shadowSmall)"/>
  <text x="1603.3" y="408" font-size="16" font-weight="500" fill="#FFFFFF" text-anchor="middle">VideoCalling</text>


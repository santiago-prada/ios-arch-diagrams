<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1300" width="2400" height="1300">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="rgba(0,0,0,0.06)"/>
    </filter>
    <filter id="shadowSmall" x="-2%" y="-5%" width="104%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <pattern id="gridDot" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1" fill="#C7C7CC"/>
    </pattern>
    <style>
      text { font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="2400" height="1300" fill="#FFFFFF"/>

  <!-- Title Area -->
  <text x="80" y="76" font-size="40" font-weight="700" fill="#1D1D1F">Implementation Roadmap</text>
  <text x="80" y="112" font-size="24" font-weight="400" fill="#8E8E93">12-Week Migration Timeline — 2 Developer Tracks</text>

  <!-- Chart Area Constants: left=320, top=180, right=2320, barAreaTop=180 -->
  <!-- Week columns: each week = (2320-320)/12 = 166.67px -->

  <!-- Week Header Background -->
  <rect x="320" y="144" width="2000" height="56" fill="#F2F2F7" rx="12"/>

  <!-- Week Labels -->
  <g font-size="22" font-weight="500" fill="#8E8E93" text-anchor="middle">
    <text x="403.3" y="180">W1</text>
    <text x="570" y="180">W2</text>
    <text x="736.7" y="180">W3</text>
    <text x="903.3" y="180">W4</text>
    <text x="1070" y="180">W5</text>
    <text x="1236.7" y="180">W6</text>
    <text x="1403.3" y="180">W7</text>
    <text x="1570" y="180">W8</text>
    <text x="1736.7" y="180">W9</text>
    <text x="1903.3" y="180">W10</text>
    <text x="2070" y="180">W11</text>
    <text x="2236.7" y="180">W12</text>
  </g>

  <!-- Vertical Gridlines (dotted) -->
  <g stroke="#E5E5EA" stroke-width="1" stroke-dasharray="6,8" opacity="0.7">
    <line x1="486.7" y1="200" x2="486.7" y2="1090"/>
    <line x1="653.3" y1="200" x2="653.3" y2="1090"/>
    <line x1="820" y1="200" x2="820" y2="1090"/>
    <line x1="986.7" y1="200" x2="986.7" y2="1090"/>
    <line x1="1153.3" y1="200" x2="1153.3" y2="1090"/>
    <line x1="1320" y1="200" x2="1320" y2="1090"/>
    <line x1="1486.7" y1="200" x2="1486.7" y2="1090"/>
    <line x1="1653.3" y1="200" x2="1653.3" y2="1090"/>
    <line x1="1820" y1="200" x2="1820" y2="1090"/>
    <line x1="1986.7" y1="200" x2="1986.7" y2="1090"/>
    <line x1="2153.3" y1="200" x2="2153.3" y2="1090"/>
  </g>

  <!-- Swim Lane Backgrounds -->
  <rect x="0" y="210" width="2400" height="420" fill="#FAFBFF" opacity="0.5"/>
  <rect x="0" y="630" width="2400" height="460" fill="#FFFAF5" opacity="0.5"/>

  <!-- Swim Lane Divider -->
  <line x1="0" y1="630" x2="2400" y2="630" stroke="#E5E5EA" stroke-width="2"/>


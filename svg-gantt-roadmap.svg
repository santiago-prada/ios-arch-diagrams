  <rect x="1386.7" y="380" width="133.3" height="44" rx="12" fill="#34C759" opacity="0.85" filter="url(#shadowSmall)"/>
  <text x="1453.3" y="408" font-size="16" font-weight="500" fill="#FFFFFF" text-anchor="middle">Onboarding</text>


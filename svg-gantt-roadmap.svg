    <text x="653.3" y="236">PHASE 0b</text>
    <text x="1403.3" y="236">PHASE 3: FEATURES</text>
    <text x="1903.3" y="236">PHASE 4</text>
    <text x="2153.3" y="236">QE</text>

    <text x="403.3" y="656">PHASE 0</text>
    <text x="653.3" y="656">PHASE 1</text>
    <text x="1070" y="656">PH 2</text>
    <text x="1570" y="656">PHASE 3: FEATURES</text>
    <text x="1903.3" y="656">PH 4</text>
    <text x="2153.3" y="656">QE</text>

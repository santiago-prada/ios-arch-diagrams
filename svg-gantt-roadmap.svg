  <rect x="1220" y="320" width="166.7" height="44" rx="12" fill="#34C759" opacity="0.9" filter="url(#shadowSmall)"/>
  <text x="1303.3" y="348" font-size="18" font-weight="500" fill="#FFFFFF" text-anchor="middle">FeatureAccount</text>


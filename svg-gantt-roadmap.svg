<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" width="1200" height="650">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="rgba(0,0,0,0.06)"/>
    </filter>
    <filter id="shadowSmall" x="-2%" y="-5%" width="104%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <pattern id="gridDot" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#C7C7CC"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="650" fill="#FFFFFF" rx="0" ry="0"/>

  <!-- Title Area -->

    <text x="326.7" y="118">PHASE 0b</text>
    <text x="701.7" y="118">PHASE 3: FEATURES</text>
    <text x="951.7" y="118">PHASE 4</text>
    <text x="1076.7" y="118">QE</text>

    <text x="201.7" y="328">PHASE 0</text>
    <text x="326.7" y="328">PHASE 1</text>
    <text x="535" y="328">PH 2</text>
    <text x="785" y="328">PHASE 3: FEATURES</text>
    <text x="951.7" y="328">PH 4</text>
    <text x="1076.7" y="328">QE</text>

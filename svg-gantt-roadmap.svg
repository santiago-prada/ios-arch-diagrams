  <line x1="2380" y1="144" x2="2380" y2="1056" stroke="#FF3B30" stroke-width="3" stroke-dasharray="10,6"/>
  <rect x="2230" y="100" width="300" height="52" rx="10" fill="#FF3B30" filter="url(#shadowSmall)"/>
  <text x="2380" y="124" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">myQ SDK Login Migration</text>
  <text x="2380" y="144" font-size="14" font-weight="500" fill="rgba(255,255,255,0.9)" text-anchor="middle">End of Q2 2026</text>
  <!-- Triangle pointer -->

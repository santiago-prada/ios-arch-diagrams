  <rect x="693.3" y="190" width="66.7" height="22" rx="6" ry="6" fill="#34C759" opacity="0.85" filter="url(#shadowSmall)"/>
  <text x="726.7" y="205" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="8" font-weight="500" fill="#FFFFFF" text-anchor="middle">Onboarding</text>


  <rect x="1986.7" y="780" width="333.3" height="44" rx="12" fill="#FF2D55" opacity="0.85" filter="url(#shadowSmall)"/>
  <text x="2153.3" y="808" font-size="20" font-weight="500" fill="#FFFFFF" text-anchor="middle">Integration Testing</text>


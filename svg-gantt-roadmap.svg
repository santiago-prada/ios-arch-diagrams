  <rect x="1286.7" y="780" width="166.7" height="44" rx="12" fill="#34C759" opacity="0.9" filter="url(#shadowSmall)"/>
  <text x="1370" y="808" font-size="18" font-weight="500" fill="#FFFFFF" text-anchor="middle">FeatureAdmin</text>


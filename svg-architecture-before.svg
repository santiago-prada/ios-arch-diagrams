    <path d="M240,400 C400,320 560,520 720,380" stroke="#FF6B6B" stroke-width="2.4" fill="none" stroke-dasharray="6,4"/>
    <path d="M360,480 C520,600 680,360 900,520" stroke="#FF9500" stroke-width="2.4" fill="none"/>
    <path d="M200,560 C400,700 700,400 1000,600" stroke="#FF6B6B" stroke-width="2" fill="none" stroke-dasharray="8,4"/>
    <path d="M400,360 C600,500 360,640 800,440" stroke="#FF9500" stroke-width="2" fill="none"/>
    <path d="M760,360 C840,560 560,600 1040,480" stroke="#FF6B6B" stroke-width="2.4" fill="none"/>
    <path d="M280,640 C500,500 700,760 1000,560" stroke="#FF9500" stroke-width="2" fill="none" stroke-dasharray="6,6"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <filter id="shadowSmall" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.06)"/>
    </filter>
    <marker id="arrowRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF6B6B"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C7C7CC"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="40" y="42" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="20" font-weight="700" fill="#1D1D1F">Before</text>
  <text x="108" y="42" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="20" font-weight="400" fill="#8E8E93"> — Monolithic Architecture</text>

  <!-- Badge top-right -->
  <rect x="578" y="18" width="300" height="32" rx="16" ry="16" fill="#FFF3F0" stroke="#FFD6CC" stroke-width="1" filter="url(#shadowSmall)"/>
  <text x="598" y="39" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="11" font-weight="600" fill="#E8453C">350+ files · 1 module · Full recompile</text>
  <circle cx="862" cy="34" r="6" fill="#FF3B30"/>
  <text x="858.5" y="37.5" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">!</text>

  <!-- Main monolith container -->
  <rect x="40" y="68" width="620" height="480" rx="16" ry="16" fill="#FAFAFA" stroke="#E5E5EA" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="68" width="620" height="44" rx="16" ry="16" fill="#F2F2F7"/>
  <rect x="40" y="96" width="620" height="16" fill="#F2F2F7"/>
  <text x="60" y="97" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="14" font-weight="600" fill="#1D1D1F">community.xcodeproj</text>
  <text x="310" y="97" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="11" fill="#8E8E93">Single Target · Everything Coupled</text>

  <!-- Tangled spaghetti lines (drawn first, behind boxes) -->
  <!-- Layer of chaotic coupling lines -->
  <g opacity="0.5">
    <!-- Horizontal tangles -->
    <path d="M120,200 C200,160 280,260 360,190" stroke="#FF6B6B" stroke-width="1.2" fill="none" stroke-dasharray="3,2"/>
    <path d="M180,240 C260,300 340,180 450,260" stroke="#FF9500" stroke-width="1.2" fill="none"/>
    <path d="M100,280 C200,350 350,200 500,300" stroke="#FF6B6B" stroke-width="1" fill="none" stroke-dasharray="4,2"/>
    <path d="M200,180 C300,250 180,320 400,220" stroke="#FF9500" stroke-width="1" fill="none"/>
    <path d="M380,180 C420,280 280,300 520,240" stroke="#FF6B6B" stroke-width="1.2" fill="none"/>
    <path d="M140,320 C250,250 350,380 500,280" stroke="#FF9500" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
    <path d="M460,190 C500,300 350,350 580,250" stroke="#FF6B6B" stroke-width="1" fill="none"/>
    <path d="M100,380 C200,300 400,420 560,350" stroke="#FF9500" stroke-width="1.2" fill="none"/>
    <path d="M200,350 C320,280 180,420 450,370" stroke="#FF6B6B" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
    <path d="M300,200 C350,350 450,250 400,400" stroke="#FF9500" stroke-width="1" fill="none"/>

    <!-- Vertical tangles -->
    <path d="M150,170 C120,280 250,300 180,420" stroke="#FF6B6B" stroke-width="1" fill="none"/>
    <path d="M350,160 C400,280 300,350 380,450" stroke="#FF9500" stroke-width="1.2" fill="none" stroke-dasharray="3,2"/>
    <path d="M500,180 C460,300 540,350 480,440" stroke="#FF6B6B" stroke-width="1" fill="none"/>
    <path d="M250,200 C220,320 300,380 260,470" stroke="#FF9500" stroke-width="1" fill="none" stroke-dasharray="4,2"/>

    <!-- Cross tangles -->
    <path d="M100,200 C300,350 450,180 600,400" stroke="#FF6B6B" stroke-width="1" fill="none"/>
    <path d="M580,170 C400,300 200,250 120,450" stroke="#FF9500" stroke-width="1.2" fill="none" stroke-dasharray="3,3"/>
    <path d="M300,160 C150,350 500,400 250,490" stroke="#FF6B6B" stroke-width="1" fill="none"/>
    <path d="M550,200 C350,320 500,400 200,380" stroke="#FF9500" stroke-width="1" fill="none" stroke-dasharray="5,2"/>

    <!-- Dense center coupling -->
    <path d="M250,250 C300,200 350,300 400,250" stroke="#FF3B30" stroke-width="1.5" fill="none"/>
    <path d="M280,280 C350,230 320,350 420,280" stroke="#FF3B30" stroke-width="1.2" fill="none"/>
    <path d="M200,300 C300,250 280,380 400,310" stroke="#FF3B30" stroke-width="1" fill="none"/>
    <path d="M320,220 C280,320 400,280 350,380" stroke="#FF3B30" stroke-width="1.3" fill="none"/>
  </g>

  <!-- Internal boxes — User Flows cluster -->

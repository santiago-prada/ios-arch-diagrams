  <!-- Extension targets (outside main container) -->
  <text x="700" y="90" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="10" font-weight="600" fill="#8E8E93" letter-spacing="1">EXTENSIONS</text>


  <text x="128" y="217" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="11" font-weight="500" fill="#CC7700">Video Call</text>

  <rect x="186" y="200" width="96" height="36" rx="8" ry="8" fill="#FFF8F0" stroke="#FFD6A8" stroke-width="1" filter="url(#shadowSmall)"/>
  <text x="234" y="222" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="11" font-weight="500" fill="#CC7700">Admin</text>


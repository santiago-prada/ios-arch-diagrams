  <rect x="80" y="136" width="1240" height="88" rx="32" ry="32" fill="#F2F2F7"/>
  <rect x="80" y="192" width="1240" height="32" fill="#F2F2F7"/>
  <text x="120" y="194" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="28" font-weight="600" fill="#1D1D1F">community.xcodeproj</text>
  <text x="620" y="194" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="22" fill="#8E8E93">Single Target · Everything Coupled</text>


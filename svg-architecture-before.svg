  <text x="147" y="456" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="10" font-weight="500" fill="#636366">UI Shared</text>

  <rect x="205" y="440" width="95" height="32" rx="8" ry="8" fill="#F0F0F5" stroke="#D1D1D6" stroke-width="1" filter="url(#shadowSmall)"/>
  <text x="252" y="460" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="10" font-weight="500" fill="#636366">Constants</text>

  <rect x="310" y="436" width="95" height="32" rx="8" ry="8" fill="#F0F0F5" stroke="#D1D1D6" stroke-width="1" filter="url(#shadowSmall)"/>
  <text x="357" y="456" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="10" font-weight="500" fill="#636366">KeychainUtil</text>

  <rect x="415" y="440" width="80" height="32" rx="8" ry="8" fill="#EAEAEF" stroke="#D1D1D6" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="455" y="460" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="10" font-weight="500" fill="#636366">+13 more</text>

  <!-- File count label bottom -->
  <rect x="60" y="490" width="580" height="40" rx="10" ry="10" fill="#FFF8F0" stroke="#FFD6A8" stroke-width="1"/>

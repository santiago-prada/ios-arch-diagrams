  <text x="1196" y="78" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="22" font-weight="600" fill="#E8453C">350+ files · 1 module · Full recompile</text>
  <circle cx="1724" cy="68" r="12" fill="#FF3B30"/>
  <text x="1717" y="75" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">!</text>

  <!-- Main monolith container -->

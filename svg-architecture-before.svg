  <text x="1560" y="536" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="26" font-weight="600" fill="#1D1D1F">Intent</text>
  <text x="1560" y="576" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="20" fill="#FF3B30" font-weight="500">imports entire app</text>


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1200" width="1800" height="1200">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <filter id="shadowSmall" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.06)"/>
    </filter>
    <marker id="arrowRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="16" markerHeight="12" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF6B6B"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="16" markerHeight="12" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C7C7CC"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1800" height="1200" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="80" y="84" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="40" font-weight="700" fill="#1D1D1F">Before</text>
  <text x="216" y="84" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="40" font-weight="400" fill="#8E8E93"> — Monolithic Architecture</text>

  <!-- Badge top-right -->

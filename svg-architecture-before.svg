    <path d="M1000,360 C920,600 1080,700 960,880" stroke="#FF6B6B" stroke-width="2" fill="none"/>
    <path d="M500,400 C440,640 600,760 520,940" stroke="#FF9500" stroke-width="2" fill="none" stroke-dasharray="8,4"/>

    <!-- Cross tangles -->

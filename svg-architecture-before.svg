    <path d="M1160,340 C800,600 400,500 240,900" stroke="#FF9500" stroke-width="2.4" fill="none" stroke-dasharray="6,6"/>
    <path d="M600,320 C300,700 1000,800 500,980" stroke="#FF6B6B" stroke-width="2" fill="none"/>
    <path d="M1100,400 C700,640 1000,800 400,760" stroke="#FF9500" stroke-width="2" fill="none" stroke-dasharray="10,4"/>

    <!-- Dense center coupling -->
    <path d="M500,500 C600,400 700,600 800,500" stroke="#FF3B30" stroke-width="3" fill="none"/>
    <path d="M560,560 C700,460 640,700 840,560" stroke="#FF3B30" stroke-width="2.4" fill="none"/>
    <path d="M400,600 C600,500 560,760 800,620" stroke="#FF3B30" stroke-width="2" fill="none"/>
    <path d="M640,440 C560,640 800,560 700,760" stroke="#FF3B30" stroke-width="2.6" fill="none"/>
  </g>


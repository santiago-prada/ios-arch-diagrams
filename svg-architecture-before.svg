  <rect x="695" y="245" width="170" height="56" rx="12" ry="12" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="1" filter="url(#shadow)"/>
  <text x="780" y="268" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="13" font-weight="600" fill="#1D1D1F">Intent</text>
  <text x="780" y="288" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="10" fill="#FF3B30" font-weight="500">imports entire app</text>

  <!-- Fat arrows from extensions to monolith -->
  <line x1="695" y1="133" x2="665" y2="200" stroke="#FF3B30" stroke-width="2" marker-end="url(#arrowRed)" opacity="0.7"/>
  <line x1="695" y1="203" x2="665" y2="280" stroke="#FF3B30" stroke-width="2" marker-end="url(#arrowRed)" opacity="0.7"/>
  <line x1="695" y1="273" x2="665" y2="350" stroke="#FF3B30" stroke-width="2" marker-end="url(#arrowRed)" opacity="0.7"/>

